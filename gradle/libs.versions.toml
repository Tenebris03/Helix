[versions]
agp = "9.2.0"
coroutines = "1.11.0"
coreKtx = "1.10.1"
junit = "4.13.2"
junitVersion = "1.1.5"
espressoCore = "3.5.1"
lifecycleRuntimeKtx = "2.6.1"
activityCompose = "1.8.0"
kotlin = "2.1.0"
composeBom = "2026.02.01"
material3 = "1.5.0-alpha11"
material3AdaptiveNavigationSuite = "1.5.0-alpha11"
room = "2.7.0-beta01"
datastore = "1.1.1"
navigation = "2.8.5"
lifecycle = "2.8.7"
ksp = "2.1.0-1.0.29"
retrofit = "3.0.0"
okhttp = "5.3.2"
kotlinx-serialization = "1.8.0"
mlkit-barcode = "17.3.0"
mlkit-image-labeling = "17.0.9"
